<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - Expense Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="bg-light">
  <main class="signup-page">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
          <div class="signup-card p-5 shadow-sm">
            <h1 class="h2 fw-bold text-center mb-4">Create Account <span>🚀</span></h1>
            <form>
              <div class="mb-3">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" class="form-control form-control-lg" id="fullName" placeholder="Full Name" />
              </div>
              <div class="mb-3">
                <label for="signupEmail" class="form-label">Email</label>
                <input type="email" class="form-control form-control-lg" id="signupEmail" placeholder="Email" />
              </div>
              <div class="mb-3 position-relative">
                <label for="signupPassword" class="form-label">Password</label>
                <input type="password" class="form-control form-control-lg" id="signupPassword" placeholder="Password" />
              </div>
              <div class="mb-4">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" class="form-control form-control-lg" id="confirmPassword" placeholder="Confirm Password" />
              </div>
              <button type="submit" class="btn btn-success signup-button">Create Account</button>
            </form>
            <p class="text-center auth-note mt-4 mb-0">Already have account? <a href="../login.html">Login</a></p>
            <p class="text-center auth-note mt-2 mb-0"><a href="../index.html">Back to Home</a></p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
