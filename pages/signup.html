<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabaseClient = supabase.createClient(
    "https://zwziuzioivscsslccncl.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3eml1emlvaXZzY3NzbGNjbmNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMjEyNTMsImV4cCI6MjA5Mjc5NzI1M30.Hd5prLont0ML2jO5Upt1LrFgtRoP9UpsVW31qmIy6js"
  )

  function showMessage(text, type) {
    const msg = document.getElementById("msgBox")
    msg.className = "alert alert-" + type + " mt-3"
    msg.innerText = text
    msg.classList.remove("d-none")
  }

  document.getElementById("signupForm").addEventListener("submit", async (e) => {
    e.preventDefault()

    const name     = document.getElementById("fullName").value.trim()
    const email    = document.getElementById("signupEmail").value.trim()
    const password = document.getElementById("signupPassword").value.trim()
    const confirm  = document.getElementById("confirmPassword").value.trim()

    // Check passwords match
    if (password !== confirm) {
      showMessage("Passwords do not match!", "danger")
      return
    }

    showMessage("Creating account...", "info")

    // 1. Create auth user
    const { data, error } = await supabaseClient.auth.signUp({ email, password })

    if (error) {
      showMessage(error.message, "danger")
      return
    }

    // 2. Save name into users table
    const { error: dbError } = await supabaseClient
      .from("users")
      .insert({ id: data.user.id, name: name, email: email })

    if (dbError) {
      showMessage(dbError.message, "danger")
      return
    }

    // 3. Success → go to login
   showMessage("Account created! Redirecting to login...", "success")
   setTimeout(() => window.location.href = "login.html", 2000)
  })
</script>
