

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Expense - Expense Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="bg-light">
  <!-- Mobile Sidebar (Offcanvas) -->
  <div class="offcanvas offcanvas-start mobile-sidebar" tabindex="-1" id="mobileSidebar">
    <div class="offcanvas-header">
      <h5 class="fw-bold">Menu</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="user-info">
      <div class="d-flex align-items-center gap-3">
        <div class="user-avatar">👤</div>
        <div>
          <h6 class="mb-0 fw-bold profile-heading"></h6>
          <p class="mb-0 text-muted small user-email"></p>
        </div>
      </div>
    </div>
    <div class="offcanvas-body">
      <div class="nav-menu">
        <div class="list-group list-group-flush">
          <a href="dashboard.html" class="list-group-item list-group-item-action">Dashboard</a>
          <a href="add-expense.html" class="list-group-item list-group-item-action active">Add Expense</a>
          <a href="bills.html" class="list-group-item list-group-item-action">Manage Bills</a>
          <a href="history.html" class="list-group-item list-group-item-action">Expense History</a>
          <a href="budget.html" class="list-group-item list-group-item-action">Budgets</a>
          <a href="reports.html" class="list-group-item list-group-item-action">Reports</a>
          <a href="shared.html" class="list-group-item list-group-item-action">Shared expenses</a>
          <a href="profile.html" class="list-group-item list-group-item-action">Profile</a>
          <a href="../index.html" class="list-group-item list-group-item-action text-danger">Logout</a>
        </div>
      </div>
    </div>
  </div>
 
  <!-- Mobile Header -->
  <header class="py-2 d-lg-none fixed-top bg-white shadow-sm">
    <div class="container d-flex align-items-center justify-content-between">
      <button class="btn border-0 p-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/></svg>
      </button>
      <span class="fw-bold text-success">Expense Tracker</span>
      <a href="profile.html" class="btn p-0">
        <div style="width: 32px; height: 32px; display: grid; place-items: center; border-radius: 8px; background: rgba(45, 212, 191, 0.2); color: #0f766e;">👤</div>
      </a>
    </div>
  </header>
 
  <main class="py-5">
    <div class="container">
      <div class="row gy-4">
        <div class="col-lg-3 d-none d-lg-block">
          <div class="sidebar-panel p-4 shadow-sm">
            <div class="d-flex align-items-center gap-3 mb-4">
              <div class="profile-avatar">👤</div>
              <div>
                <h5 class="mb-1 profile-heading"></h5>
                <p class="mb-0 text-muted user-email"></p>
              </div>
            </div>
            <div class="sidebar-nav">
              <div class="list-group list-group-flush">
                <a href="dashboard.html" class="list-group-item list-group-item-action">Dashboard</a>
                <a href="add-expense.html" class="list-group-item list-group-item-action active">Add Expense</a>
                <a href="bills.html" class="list-group-item list-group-item-action">Manage Bills</a>
                <a href="history.html" class="list-group-item list-group-item-action">Expense History</a>
                <a href="budget.html" class="list-group-item list-group-item-action">Budgets</a>
                <a href="reports.html" class="list-group-item list-group-item-action">Reports</a>
                <a href="shared.html" class="list-group-item list-group-item-action">Shared expenses</a>
                <a href="profile.html" class="list-group-item list-group-item-action">Profile</a>
                <a href="../index.html" class="list-group-item list-group-item-action text-danger">Logout</a>
              </div>
            </div>
          </div>
        </div>
        <div class="col-lg-9">
          <div class="p-4 shadow-sm mb-4 bg-white rounded-4">
            <h2 class="fw-bold mb-3 text-center text-success">Add New Expense</h2>
            <div id="msgBox" class="alert d-none"></div>
            <form id="expenseForm" class="row g-4 justify-content-center">
              <div class="col-12 col-md-10">
                <label class="form-label fw-semibold">Expense Name</label>
                <input type="text" id="expName" class="form-control" placeholder="Enter expense description..." required />
              </div>
              <div class="col-12 col-md-10">
                <label class="form-label fw-semibold">Amount</label>
                <input type="number" id="expAmount" class="form-control" placeholder="0.00" min="0" step="0.01" required />
              </div>
              <div class="col-12 col-md-10">
                <div class="row g-2 align-items-end">
                  <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Date</label>
                    <input type="date" id="expDate" class="form-control" required />
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">Category</label>
                    <select id="expCategory" class="form-select" required>
                      <option value="">Select...</option>
                      <option>Student</option>
                      <option>Groceries</option>
                      <option>Bills</option>
                      <option>Business</option>
                      <option>Food</option>
                      <option>Travel</option>
                    </select>
                  </div>
                </div>
              </div>
              <div class="col-12 col-md-10">
                <label class="form-label fw-semibold">Add New Category</label>
                <div class="row g-2">
                  <div class="col-12 col-md-8">
                    <input type="text" id="newCatInput" class="form-control" placeholder="New Category Name..." />
                  </div>
                  <div class="col-12 col-md-4">
                    <button type="button" id="addCatBtn" class="btn btn-outline-success w-100">Add Category</button>
                  </div>
                </div>
                <div class="mt-3"><span class="fw-semibold">Suggested Categories</span></div>
                <div class="d-flex flex-wrap gap-2 mt-2" id="suggestedCats">
                  <span class="badge rounded-pill bg-light border text-dark px-3 py-2" style="cursor:pointer;">Food</span>
                  <span class="badge rounded-pill bg-light border text-dark px-3 py-2" style="cursor:pointer;">Bills</span>
                  <span class="badge rounded-pill bg-light border text-dark px-3 py-2" style="cursor:pointer;">Travel</span>
                </div>
              </div>
              <div class="col-12 col-md-10">
                <label class="form-label fw-semibold">Repetition Type</label>
                <div class="d-flex gap-2 flex-wrap">
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="repetitionType" id="daily" value="Daily" checked />
                    <label class="form-check-label" for="daily">Daily</label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="repetitionType" id="weekly" value="Weekly" />
                    <label class="form-check-label" for="weekly">Weekly</label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="repetitionType" id="monthly" value="Monthly" />
                    <label class="form-check-label" for="monthly">Monthly</label>
                  </div>
                </div>
              </div>
              <div class="col-12 col-md-10">
                <div class="row g-2 mt-2">
                  <div class="col-12 col-md-6">
                    <button type="submit" class="btn btn-success w-100">ADD EXPENSE</button>
                  </div>
                  <div class="col-12 col-md-6">
                    <a href="dashboard.html" class="btn btn-outline-secondary w-100">CANCEL</a>
                  </div>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
 
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const sb = supabase.createClient(
      "https://zwziuzioivscsslccncl.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3eml1emlvaXZzY3NzbGNjbmNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMjEyNTMsImV4cCI6MjA5Mjc5NzI1M30.Hd5prLont0ML2jO5Upt1LrFgtRoP9UpsVW31qmIy6js"
    );
 
    let currentUser = null;
 
    function showMsg(text, type="danger") {
      const b = document.getElementById("msgBox");
      b.className = "alert alert-" + type;
      b.innerText = text;
      b.classList.remove("d-none");
    }
 
    // Suggested category click → set select
    document.querySelectorAll("#suggestedCats .badge").forEach(badge => {
      badge.addEventListener("click", () => {
        const sel = document.getElementById("expCategory");
        // Add option if not exist
        if (![...sel.options].find(o => o.value === badge.innerText)) {
          sel.add(new Option(badge.innerText, badge.innerText));
        }
        sel.value = badge.innerText;
      });
    });
 
    // Add custom category
    document.getElementById("addCatBtn").addEventListener("click", () => {
      const val = document.getElementById("newCatInput").value.trim();
      if (!val) return;
      const sel = document.getElementById("expCategory");
      if (![...sel.options].find(o => o.value === val)) {
        sel.add(new Option(val, val));
      }
      sel.value = val;
      document.getElementById("newCatInput").value = "";
    });
 
    // Set today's date default
    document.getElementById("expDate").value = new Date().toISOString().split("T")[0];
 
    document.addEventListener("DOMContentLoaded", async () => {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) { window.location.href = "login.html"; return; }
      currentUser = user;
 
      const { data } = await sb.from("users").select("name,email").eq("id", user.id).single();
      if (data) {
        document.querySelectorAll(".profile-heading").forEach(el => el.innerText = data.name || "");
        document.querySelectorAll(".user-email").forEach(el => el.innerText = data.email || user.email || "");
      }
 
      // Logout
      document.querySelectorAll("a.text-danger").forEach(el => {
        el.addEventListener("click", async (e) => {
          e.preventDefault();
          await sb.auth.signOut();
          window.location.href = "../index.html";
        });
      });
    });
 
    document.getElementById("expenseForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = document.getElementById("expName").value.trim();
      const amount = parseFloat(document.getElementById("expAmount").value);
      const date = document.getElementById("expDate").value;
      const category = document.getElementById("expCategory").value;
      const repetition = document.querySelector("input[name='repetitionType']:checked").value;
 
      if (!name || !amount || !date || !category) {
        showMsg("Please fill all required fields.", "danger"); return;
      }
 
      const { error } = await sb.from("expenses").insert({
        user_id: currentUser.id, name, amount, date, category, repetition
      });
 
      if (error) { showMsg(error.message, "danger"); return; }
      showMsg("Expense added successfully! ✅", "success");
      document.getElementById("expenseForm").reset();
      document.getElementById("expDate").value = new Date().toISOString().split("T")[0];
    });
  </script>
</body>
</html>
