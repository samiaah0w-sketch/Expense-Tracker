<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In - Expense Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="bg-light">
  <main class="auth-page">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
          <div class="auth-card p-5 shadow-sm">
            <div class="text-center mb-4">
              <div class="auth-icon">🏦</div>
              <h1 class="h2 fw-bold mb-2">Welcome back</h1>
              <p class="text-muted mb-0">Sign in to your account</p>
            </div>
            <form action="profile.html" method="GET">
              <div class="mb-3">
                <label for="loginEmail" class="form-label">Email</label>
                <input type="email" class="form-control form-control-lg" id="loginEmail" name="email" placeholder="you@example.com" />
              </div>
              <div class="mb-3">
                <label for="loginPassword" class="form-label">Password</label>
                <input type="password" class="form-control form-control-lg" id="loginPassword" name="password" placeholder="Password" />
              </div>
              <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" value="" id="rememberCheck">
                <label class="form-check-label" for="rememberCheck">Remember me</label>
              </div>
              <button type="submit" class="btn btn-success auth-button">Sign In</button>
            </form>
            <p class="text-center auth-note mt-4 mb-0">Don't have account? <a href="signup.html">Sign up</a></p>
            <p class="text-center auth-note mt-2 mb-0"><a href="../index.html">Back to Home</a></p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
